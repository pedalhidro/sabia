name: refresh-token

# Renova o token long-lived do Instagram (via Facebook-Login, EAA) ANTES dos ~60 dias e rola o
# ph-composer. Sem isto o token expira e /anuncio e /excluir_post quebram ("Session has expired").
#
# É um token de USUÁRIO de 60 dias → estende com fb_exchange_token (precisa do APP ID + APP SECRET).
# Precisa rodar ANTES de expirar; se expirar de vez, é re-login manual (fb_exchange não ressuscita
# token morto). Roda dias 1 e 15 → sempre bem dentro dos 60d.
#
# Pré-requisitos (uma vez), no Secret Manager + IAM (comandos no corpo do PR):
#   - secret ig-app-id       (o App ID do app do Meta)
#   - secret ig-app-secret   (o App Secret — sensível)
#   - ph-bot-deployer com secretAccessor em ig-app-id, ig-app-secret, ig-access-token
#     e secretVersionAdder em ig-access-token (e ig-manage-token, se existir).

on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - uses: google-github-actions/setup-gcloud@v2

      - name: refresh FB token + roll ph-composer
        env:
          PROJECT: pedal-hidrografico
          REGION: southamerica-east1
        run: |
          set -euo pipefail
          acc() { gcloud secrets versions access latest --secret="$1" --project "$PROJECT"; }

          CUR="$(acc ig-access-token)"
          APP_ID="$(acc ig-app-id)"
          APP_SECRET="$(acc ig-app-secret)"

          # Estende o token de 60 dias (Facebook-Login). -G/--data-urlencode monta o querystring.
          RESP="$(curl -sS --max-time 30 -G "https://graph.facebook.com/v21.0/oauth/access_token" \
            --data-urlencode "grant_type=fb_exchange_token" \
            --data-urlencode "client_id=${APP_ID}" \
            --data-urlencode "client_secret=${APP_SECRET}" \
            --data-urlencode "fb_exchange_token=${CUR}")"
          NEW="$(printf '%s' "$RESP" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("access_token",""))' || true)"
          if [ -z "$NEW" ]; then echo "::error::Refresh falhou. Resposta do Graph: $RESP"; exit 1; fi

          # Grava a nova versão em cada secret de token (o parse já vem sem newline — sem "Bad
          # signature"). Guarda o número da versão pra rolar o serviço numa versão explícita
          # (secret em env var pina por revisão; :latest não força revisão nova).
          UPD=""
          for S in ig-access-token ig-manage-token; do
            gcloud secrets describe "$S" --project "$PROJECT" >/dev/null 2>&1 || continue
            V="$(printf '%s' "$NEW" | gcloud secrets versions add "$S" --data-file=- --project "$PROJECT" --format='value(name)')"
            V="${V##*/}"
            echo "$S ← v$V"
            ENVN="IG_ACCESS_TOKEN"; [ "$S" = "ig-manage-token" ] && ENVN="IG_MANAGE_TOKEN"
            UPD="${UPD:+$UPD,}${ENVN}=${S}:${V}"
          done

          gcloud run services update ph-composer --project "$PROJECT" --region "$REGION" \
            --update-secrets "$UPD" --quiet
          echo "ph-composer rolado ($UPD)."
